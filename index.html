<script>

/* ================= MAP ================= */
var parkingLat = 41.3275;
var parkingLng = 19.8187;

var map = L.map('map').setView([parkingLat, parkingLng], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

var marker = L.marker([parkingLat, parkingLng]).addTo(map)
  .bindPopup("Parking Location")
  .openPopup();


/* ================= LOGIN ================= */
function login(){
  if(user.value==="admin" && pass.value==="1234"){
    loginBox.style.display="none";
    app.style.display="block";
  } else {
    alert("Wrong login");
  }
}


/* ================= NAVIGATION ================= */
function navigate(){
  navigator.geolocation.getCurrentPosition(function(pos){

    let url = https://www.google.com/maps/dir/${pos.coords.latitude},${pos.coords.longitude}/${parkingLat},${parkingLng};

    window.open(url,"_blank");

  }, function(){
    alert("Lejo location");
  });
}


/* ================= LIVE DATA FROM ARDUINO ================= */

async function loadData(){
  try{
    let res = await fetch("http://localhost:3000/data");
    let d = await res.json();

    let cars = d.cars;
    let free = 3 - cars;

    /* STATUS TEXT */
    statusText.innerHTML =
      free === 0 ? "FULL ❌" : free + " vende bosh ✅";

    /* PROGRESS BAR */
    fillBar.style.width = (free / 3 * 100) + "%";

    /* SLOT UI (simbolike) */
    document.getElementById("s1").className = "slot " + (cars >= 1 ? "occupied" : "free");
    document.getElementById("s2").className = "slot " + (cars >= 2 ? "occupied" : "free");
    document.getElementById("s3").className = "slot " + (cars >= 3 ? "occupied" : "free");

    /* MAP COLOR */
    if(free === 0){
      marker.setIcon(new L.Icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
        iconSize: [32,32]
      }));
    } else {
      marker.setIcon(new L.Icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/green-dot.png",
        iconSize: [32,32]
      }));
    }

  } catch(e){
    statusText.innerHTML = "No connection to server";
  }
}

/* update çdo 1 sekondë */
setInterval(loadData, 1000);

</script>
